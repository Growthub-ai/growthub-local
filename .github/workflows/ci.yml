name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Freeze boundary check
        run: bash scripts/freeze-check.sh

      - name: Validate package version policy
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: node scripts/check-version-sync.mjs --require-bump-if-source-changed --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Run worker kit contract tests
        run: pnpm check:worker-kits

      - name: Validate release packaging
        run: node scripts/release-check.mjs

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Freeze boundary check
        run: bash scripts/freeze-check.sh

      - name: Validate package manifests
        run: |
          node -e "
            const fs = require('fs');
            const cli = JSON.parse(fs.readFileSync('cli/package.json','utf8'));
            const pkg = JSON.parse(fs.readFileSync('packages/create-growthub-local/package.json','utf8'));
            if (cli.name !== '@growthub/cli') throw new Error('cli name mismatch');
            if (pkg.name !== 'create-growthub-local') throw new Error('installer name mismatch');
            if (pkg.dependencies['@growthub/cli'] !== cli.version) throw new Error('version pin mismatch: create-growthub-local must pin @growthub/cli@' + cli.version);
            console.log('Package manifests valid. CLI:', cli.version);
          "

      - name: Validate pnpm-lock.yaml is not hand-edited
        if: github.event_name == 'pull_request' && github.head_ref != 'chore/refresh-lockfile'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          if printf '%s\n' "$changed" | grep -qx 'pnpm-lock.yaml'; then
            echo "❌ Do not commit pnpm-lock.yaml manually."
            exit 1
          fi

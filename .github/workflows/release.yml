name: Release (OSS)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch or tag to release from
        required: true
        default: main
        type: string
      dry_run:
        description: Preview release without publishing
        required: true
        type: boolean
        default: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Verify admin actor
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const admins = ['antonioromero1220'];
            if (!admins.includes(actor)) {
              core.setFailed(`Release blocked: ${actor} is not an authorized release admin.`);
            }

  verify:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Freeze boundary check
        run: bash scripts/freeze-check.sh

      - name: Validate installer package metadata
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/create-growthub-local/package.json', 'utf8'));
            if (pkg.name !== 'create-growthub-local') throw new Error('installer name mismatch');
            if (!Array.isArray(pkg.files) || !pkg.files.includes('README.md')) {
              throw new Error('create-growthub-local must include README.md in files');
            }
            if (!fs.existsSync('packages/create-growthub-local/README.md')) {
              throw new Error('packages/create-growthub-local/README.md is missing');
            }
            console.log('Installer package metadata valid for publish.');
          "

      - name: Preview installer tarball
        run: npm pack --dry-run
        working-directory: packages/create-growthub-local

  publish:
    if: "!inputs.dry_run"
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-stable
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Compute next installer version
        id: version
        run: |
          next_version="$(node <<'NODE'
          const { execSync } = require('node:child_process');
          const pkg = require('./packages/create-growthub-local/package.json');
          const base = pkg.version.split('.').map(Number);
          const raw = execSync('npm view create-growthub-local versions --json', { encoding: 'utf8' });
          const parsed = JSON.parse(raw);
          const versions = Array.isArray(parsed) ? parsed : [parsed];
          let maxPatch = base[2];
          for (const version of versions) {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version);
            if (!match) continue;
            const [major, minor, patch] = match.slice(1).map(Number);
            if (major === base[0] && minor === base[1] && patch >= maxPatch) {
              maxPatch = patch + 1;
            }
          }
          process.stdout.write(`${base[0]}.${base[1]}.${maxPatch}`);
          NODE
          )"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "Next installer version: $next_version"

      - name: Rewrite installer version
        run: |
          node -e "
            const fs = require('fs');
            const path = 'packages/create-growthub-local/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = process.env.NEXT_VERSION;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          NEXT_VERSION: ${{ steps.version.outputs.version }}

      - name: Publish installer package
        run: npm publish --provenance --access public
        working-directory: packages/create-growthub-local

      - name: Verify published README
        run: |
          npm view "create-growthub-local@${{ steps.version.outputs.version }}" readme --json

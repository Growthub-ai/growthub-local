name: Release (OSS)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch or tag to release from
        required: true
        default: main
        type: string
      stable_date:
        description: UTC date YYYY-MM-DD (resolves to stable version)
        required: false
        type: string
      dry_run:
        description: Preview release without publishing
        required: true
        type: boolean
        default: true

# Only super-admin can trigger this
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Verify admin actor
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const admins = ['antonioromero1220'];
            if (!admins.includes(actor)) {
              core.setFailed(`❌ Release blocked: ${actor} is not an authorized release admin.`);
            }

  verify:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Freeze check
        run: bash ./scripts/freeze-check.sh

      - name: Fork Sync Agent kernel packet
        run: node ./scripts/check-fork-sync.mjs

      - name: Release check
        run: node ./scripts/release-check.mjs

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm-stable
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish (dry run)
        if: inputs.dry_run
        env:
          NPM_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          args=(stable --skip-verify --dry-run)
          [ -n "${{ inputs.stable_date }}" ] && args+=(--date "${{ inputs.stable_date }}")
          ./scripts/release.sh "${args[@]}"

      - name: Publish (stable)
        if: "!inputs.dry_run"
        env:
          NPM_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          GITHUB_ACTIONS: "true"
        run: |
          args=(stable --skip-verify)
          [ -n "${{ inputs.stable_date }}" ] && args+=(--date "${{ inputs.stable_date }}")
          ./scripts/release.sh "${args[@]}"

      - name: Push stable tag
        if: "!inputs.dry_run"
        run: |
          tag="$(git tag --points-at HEAD | grep '^v' | head -1)"
          [ -z "$tag" ] && exit 1
          git push origin "refs/tags/${tag}"

      - name: Create GitHub Release
        if: "!inputs.dry_run"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(git tag --points-at HEAD | grep '^v' | head -1 | sed 's/^v//')"
          gh release create "$version" --generate-notes

name: Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Freeze boundary check
        run: bash scripts/freeze-check.sh

      - name: Release check
        run: node scripts/release-check.mjs

      - name: Install cli deps
        run: cd cli && npm install --ignore-scripts

      - name: Pack dry-run (cli)
        run: cd cli && npm pack --dry-run

      - name: Install create-growthub-local deps
        run: cd packages/create-growthub-local && npm install --ignore-scripts

      - name: Pack dry-run (create-growthub-local)
        run: cd packages/create-growthub-local && npm pack --dry-run
